<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Classify | Document Classification</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">Invoice Classifier</a>
      <nav class="nav-links" aria-label="Primary navigation">
        <a class="nav-link" href="/">Home</a>
        <a class="nav-link active" href="/classify">Classify</a>
        <a class="nav-link" href="/performance">Performance</a>
      </nav>
    </header>

    <main class="classify-shell">
      <div class="classify-left">
        <div class="classify-card">
          <p class="section-label">Upload</p>
          <h2>Classify a document</h2>

          <form id="upload-form" class="upload-form-stack">
            <label class="file-drop" id="file-drop-label">
              <input id="file-input" type="file" name="file" accept="image/*,.pdf" required />
              <span id="file-drop-text">
                <strong>Choose a file</strong>
                <small>PNG, JPG, JPEG, or PDF</small>
              </span>
            </label>
            <button type="submit" id="submit-btn">Run classification</button>
          </form>
        </div>

        <div class="classify-card preview-panel" id="preview-panel" hidden>
          <p class="section-label">Document preview</p>
          <div class="preview-container">
            <canvas id="annotated-canvas" hidden></canvas>
            <img id="preview-img" alt="Uploaded document preview" hidden />
            <p class="preview-pdf-note" id="preview-pdf-note" hidden></p>
          </div>
          <div class="bbox-legend" id="bbox-legend" hidden>
            <span class="legend-item"><span class="legend-dot" style="background:#3b82f6"></span>Invoice #</span>
            <span class="legend-item"><span class="legend-dot" style="background:#22c55e"></span>Date</span>
            <span class="legend-item"><span class="legend-dot" style="background:#a855f7"></span>Due date</span>
            <span class="legend-item"><span class="legend-dot" style="background:#f97316"></span>Total</span>
            <span class="legend-item"><span class="legend-dot" style="background:#ec4899"></span>Issuer</span>
            <span class="legend-item"><span class="legend-dot" style="background:#14b8a6"></span>Recipient</span>
          </div>
        </div>
      </div>

      <div class="classify-right">
        <div class="classify-card result-panel" id="result-panel" hidden>
          <p class="section-label">Ensemble result</p>
          <div class="result-main">
            <div class="result-badge" id="result-badge">
              <span class="result-badge-label" id="result-label">-</span>
            </div>
            <div class="result-confidence-wrap">
              <span class="result-confidence-num" id="result-confidence">-</span>
              <span class="result-confidence-text">confidence</span>
            </div>
          </div>
        </div>

        <div class="classify-card" id="models-panel" hidden>
          <p class="section-label">All model predictions</p>
          <div class="models-list" id="models-list"></div>
        </div>

        <div class="classify-card" id="fields-panel" hidden>
          <p class="section-label">Extracted invoice fields</p>
          <div class="field-list" id="field-list"></div>
        </div>

        <p class="error-text" id="error-text" hidden></p>
      </div>
    </main>

    <script>
      const form = document.getElementById('upload-form');
      const input = document.getElementById('file-input');
      const submitBtn = document.getElementById('submit-btn');
      const previewPanel = document.getElementById('preview-panel');
      const previewImg = document.getElementById('preview-img');
      const previewPdfNote = document.getElementById('preview-pdf-note');
      const annotatedCanvas = document.getElementById('annotated-canvas');
      const bboxLegend = document.getElementById('bbox-legend');
      const resultPanel = document.getElementById('result-panel');
      const resultBadge = document.getElementById('result-badge');
      const resultLabel = document.getElementById('result-label');
      const resultConfidence = document.getElementById('result-confidence');
      const modelsPanel = document.getElementById('models-panel');
      const modelsList = document.getElementById('models-list');
      const fieldsPanel = document.getElementById('fields-panel');
      const fieldList = document.getElementById('field-list');
      const errorText = document.getElementById('error-text');
      const fileDropText = document.getElementById('file-drop-text');

      const FIELD_COLORS = {
        invoice_number: '#3b82f6',
        invoice_date:   '#22c55e',
        due_date:       '#a855f7',
        total_amount:   '#f97316',
        issuer_name:    '#ec4899',
        recipient_name: '#14b8a6',
      };

      const LABEL_COLORS = {
        email:             '#3b82f6',
        invoice:           '#f97316',
        letter:            '#22c55e',
        scientific_report: '#a855f7',
      };

      let currentImageUrl = null;

      function formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / 1048576).toFixed(1) + ' MB';
      }

      /* ---- File preview on selection ---- */
      input.addEventListener('change', () => {
        const file = input.files[0];
        if (!file) { previewPanel.hidden = true; return; }

        fileDropText.innerHTML = '<strong>' + file.name + '</strong><small>' + formatSize(file.size) + '</small>';
        previewPanel.hidden = false;
        annotatedCanvas.hidden = true;
        bboxLegend.hidden = true;
        previewImg.hidden = true;
        previewPdfNote.hidden = true;

        if (file.type.startsWith('image/')) {
          const reader = new FileReader();
          reader.onload = function(e) {
            currentImageUrl = e.target.result;
            previewImg.src = currentImageUrl;
            previewImg.hidden = false;
          };
          reader.readAsDataURL(file);
        } else {
          currentImageUrl = null;
          previewPdfNote.textContent = 'PDF document \u2014 ' + formatSize(file.size) + ' \u2014 preview will appear after classification';
          previewPdfNote.hidden = false;
        }
      });

      /* ---- Bounding box drawing ---- */
      function drawBoundingBoxes(imageUrl, bboxes) {
        var img = new Image();
        img.onload = function() {
          var canvas = annotatedCanvas;
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          var ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);

          for (var i = 0; i < bboxes.length; i++) {
            var box = bboxes[i];
            var color = FIELD_COLORS[box.field] || '#3b82f6';
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.strokeRect(box.x, box.y, box.w, box.h);

            ctx.fillStyle = color;
            ctx.globalAlpha = 0.12;
            ctx.fillRect(box.x, box.y, box.w, box.h);
            ctx.globalAlpha = 1.0;

            var label = box.field.replace(/_/g, ' ');
            ctx.font = 'bold 14px sans-serif';
            var tw = ctx.measureText(label).width;
            ctx.fillStyle = color;
            ctx.fillRect(box.x, box.y - 20, tw + 8, 20);
            ctx.fillStyle = '#fff';
            ctx.fillText(label, box.x + 4, box.y - 5);
          }

          canvas.hidden = false;
          previewImg.hidden = true;
          previewPdfNote.hidden = true;
          bboxLegend.hidden = false;
        };
        img.src = imageUrl;
      }

      /* ---- Show rendered image (for PDFs) ---- */
      function showRenderedImage(base64) {
        var url = 'data:image/png;base64,' + base64;
        currentImageUrl = url;
        previewImg.src = url;
        previewImg.hidden = false;
        previewPdfNote.hidden = true;
        previewPanel.hidden = false;
      }

      /* ---- Render model results ---- */
      function renderModels(models) {
        modelsList.innerHTML = '';
        // Order: Stacking first, then CNN, then the rest
        var order = ['Stacking', 'DistilBERT-OCR', 'CNN', 'SVD+SVM', 'HOG+SVM', 'HOG+RF'];
        for (var i = 0; i < order.length; i++) {
          var name = order[i];
          var m = models[name];
          if (!m) continue;
          var color = LABEL_COLORS[m.label] || 'var(--accent)';
          var conf = m.confidence != null ? Math.round(m.confidence * 100) + '%' : '-';
          var isPrimary = name === 'Stacking';
          var row = document.createElement('div');
          row.className = 'model-row' + (isPrimary ? ' model-row-primary' : '');
          row.innerHTML =
            '<div class="model-row-name">' + name + (isPrimary ? ' <span class="model-primary-tag">ensemble</span>' : '') + '</div>' +
            '<div class="model-row-label" style="color:' + color + '">' + m.label.replace(/_/g, ' ') + '</div>' +
            '<div class="model-row-conf">' + conf + '</div>';
          modelsList.appendChild(row);
        }
        modelsPanel.hidden = !modelsList.children.length;
      }

      /* ---- Render extracted fields ---- */
      function renderFields(fields) {
        fieldList.innerHTML = '';
        var keys = Object.keys(fields || {});
        for (var i = 0; i < keys.length; i++) {
          var key = keys[i];
          var value = fields[key];
          var color = FIELD_COLORS[key] || 'var(--accent)';
          var row = document.createElement('div');
          row.className = 'field-item';
          row.innerHTML = '<span><span class="legend-dot" style="background:' + color + '"></span>' + key.replace(/_/g, ' ') + '</span><strong>' + (value != null ? value : '-') + '</strong>';
          fieldList.appendChild(row);
        }
        fieldsPanel.hidden = !fieldList.children.length;
      }

      /* ---- Form submit ---- */
      form.addEventListener('submit', function(event) {
        event.preventDefault();
        var file = input.files[0];
        if (!file) return;

        var formData = new FormData();
        formData.append('file', file);

        resultPanel.hidden = false;
        modelsPanel.hidden = true;
        fieldsPanel.hidden = true;
        errorText.hidden = true;
        resultLabel.textContent = 'Classifying...';
        resultConfidence.textContent = '-';
        resultBadge.className = 'result-badge';
        submitBtn.disabled = true;
        submitBtn.textContent = 'Running...';

        fetch('/extract', {
          method: 'POST',
          body: formData,
        })
        .then(function(response) {
          return response.json().then(function(data) {
            if (!response.ok || data.error) {
              throw new Error(data.error || 'Request failed');
            }
            return data;
          });
        })
        .then(function(data) {
          resultLabel.textContent = data.label ? data.label.replace(/_/g, ' ') : '-';
          resultBadge.className = 'result-badge badge-' + (data.label || '').replace(/ /g, '-');
          resultConfidence.textContent = data.confidence != null ? Math.round(data.confidence * 100) + '%' : '-';

          if (data.models) {
            renderModels(data.models);
          }

          if (data.fields) {
            renderFields(data.fields);
          }

          // Show rendered image for PDFs
          if (data.rendered_image) {
            showRenderedImage(data.rendered_image);
          }

          // Draw bounding boxes
          if (data.bboxes && data.bboxes.length && currentImageUrl) {
            drawBoundingBoxes(currentImageUrl, data.bboxes);
          }
        })
        .catch(function(error) {
          errorText.hidden = false;
          errorText.textContent = error.message || 'Unable to process the document.';
          resultLabel.textContent = '-';
          resultConfidence.textContent = '-';
        })
        .finally(function() {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Run classification';
        });
      });
    </script>
  </body>
</html>
